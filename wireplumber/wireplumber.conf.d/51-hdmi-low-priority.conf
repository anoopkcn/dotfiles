# Keep HDMI/DisplayPort audio from stealing the default sink when an
# external monitor is connected. Lower session priority means speakers/
# headphones always win; HDMI audio stays selectable manually via wpctl.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*HDMI.*" }
    ]
    actions = {
      update-props = {
        priority.session = 100
      }
    }
  }
]
