# fuzzel — slate theme (matches sway/config, waybar, i3status, nvim slate.lua)
# Colors are RRGGBBAA hex (no leading #).
#   bg #14161d  bg_alt #1d2029  fg #e0e2ea  muted #828c9e
#   accent #88a0c8  green #a0ddac  urgent #f7768e  border #32384a  sel #3c4e7a

font=Berkeley Mono Variable:size=12
dpi-aware=no
lines=12
width=110
prompt="❯ "
horizontal-pad=15
inner-pad=8

[colors]
background=14161deb
text=e0e2eaff
prompt=828c9eff
input=e0e2eaff
match=88a0c8ff
selection=3c4e7aff
selection-text=e0e2eaff
selection-match=a0ddacff
border=32384aff

[border]
width=2
radius=0
