# Minimal picom config — purpose is tearing elimination, not eye-candy.
# Intel modesetting has no working TearFree, so vsync here does the job.

backend = "glx";   # glx gives reliable vsync on Intel; falls back gracefully
vsync = true;

# No shadows/fades/blur — keep it lightweight and distraction-free.
shadow = false;
fading = false;

# Repaint the whole screen each frame instead of only damaged regions. With
# damage tracking on, switching to a workspace repaints just the newly-mapped
# window's region — and for one frame its pixmap is empty, so the root
# (wallpaper) flashes through. Full repaints composite from the ready pixmap,
# which largely eliminates that workspace-switch wallpaper flash. Costs a bit
# more GPU; negligible on this Intel iGPU.
use-damage = false;

# Keep every window redirected through the compositor (belt-and-suspenders with
# i3 tiling, where a single window filling the screen could be unredirected).
unredir-if-possible = false;
