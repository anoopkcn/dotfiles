# hyprlock — lock screen styled to match the ReGreet login screen (wallpaper,
# clock, always-visible password box, slate palette). Runs INSIDE the session
# as your user (unlike ReGreet, which greetd runs outside it), so it can use
# the home-dir wallpaper and Berkeley Mono directly.

general {
    hide_cursor = true
}

background {
    monitor =
    path = /home/akc/Images/wallpaper/fall_croped.png
    color = rgb(14161d)      # fallback if the image is missing
    blur_passes = 2          # blurred = "locked", distinct from the greeter
    blur_size = 6
}

label {
    monitor =
    text = $TIME
    color = rgb(e0e2ea)
    font_size = 72
    font_family = Berkeley Mono Variable
    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgb(828c9e)
    font_size = 16
    font_family = Berkeley Mono Variable
    position = 0, 90
    halign = center
    valign = center
}

input_field {
    monitor =
    size = 300, 48
    position = 0, 0
    halign = center
    valign = center
    outer_color = rgb(3c4e7a)
    inner_color = rgb(1d2029)
    font_color = rgb(e0e2ea)
    font_family = Berkeley Mono Variable
    placeholder_text = <span foreground="##828c9e">Password...</span>
    fade_on_empty = false
    rounding = 0
    outline_thickness = 2
    check_color = rgb(88a0c8)
    fail_color = rgb(f7768e)
    fail_text = <span foreground="##f7768e">wrong ($ATTEMPTS)</span>
}
