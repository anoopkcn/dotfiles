# hypridle — idle/lock/DPMS (replaces swayidle.sh).
# Lock at 10 min unless audio is playing; screens off at 15 min; lock before
# sleep. Fullscreen video never idles (idle_inhibit window rule in rules.lua);
# windowed audio/video is covered by the pactl check below, which replaces
# xidlehook's --not-when-audio. Same caveat as the swayidle version: if audio
# was playing at the 10-min mark, the lock won't re-fire until the next
# activity->idle cycle.

general {
    # Single-instance lock; SUPER+SHIFT+X and before_sleep route through this
    # via loginctl lock-session.
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

# Lock after 10 min — unless a sink is actively RUNNING (music, video calls).
listener {
    timeout = 600
    on-timeout = pactl list sinks | grep -q RUNNING || loginctl lock-session
}

# Screens off after 15 min, back on at any activity.
listener {
    timeout = 900
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}
