# greetd + ReGreet — Wayland-native graphical login (replaced tuigreet, whose
# text-mode VT rendering split/smeared across the 4K + laptop panel combo).
# System-level config, so it can't be symlinked like the rest of the dotfiles;
# copy into place instead (all three files):
#   sudo cp wayland/greetd/config.toml         /etc/greetd/config.toml
#   sudo cp wayland/greetd/hyprland-greeter.lua /etc/greetd/
#   sudo cp wayland/greetd/regreet.toml         /etc/greetd/

[terminal]
# VT to run the greeter on. lightdm used VT 7; greetd convention is VT 1.
vt = 1

[default_session]
# ReGreet is a GTK app and needs a Wayland compositor to draw it: a minimal
# Hyprland instance with the same monitor layout as the real session.
# start-hyprland (not bare Hyprland) avoids the watchdog warning banner.
command = "dbus-run-session start-hyprland -- -c /etc/greetd/hyprland-greeter.lua"
user = "greeter"
