# fuzzel — slate theme (matches hypr config, waybar, dunst, nvim slate.lua)
# Surface system: floating chrome sits on surface #1d2029 with a border hairline,
# same as waybar and dunst — the desktop ground (#14161d) shows only the wallpaper.
# Colors are RRGGBBAA hex (no leading #).
#   bg #14161d  surface #1d2029  fg #e0e2ea  muted #828c9e
#   accent #88a0c8  green #a0ddac  urgent #f7768e  border #32384a  sel #3c4e7a

font=Berkeley Mono Variable:size=14
dpi-aware=no
lines=12
width=100
prompt="❯ "
fields=filename,name
horizontal-pad=18
vertical-pad=12
inner-pad=10
line-height=22

[colors]
background=1d2029f2
text=e0e2eaff
prompt=828c9eff
input=e0e2eaff
match=88a0c8ff
selection=3c4e7aff
selection-text=e0e2eaff
selection-match=a0ddacff
border=32384aff

[border]
width=1
radius=0

# Tab cycles to the next entry (wrapping), Shift+Tab to the previous — so the
# mod+Tab window switcher feels like alt-tab. By default fuzzel binds Tab to
# "execute-or-next", which auto-launches once the filter narrows to one match;
# unbinding that and using next-with-wrap gives predictable cycling instead.
# (Shift+Tab is already prev-with-wrap by default.) Applies to all fuzzel modes.
[key-bindings]
execute-or-next=none
next-with-wrap=Tab
