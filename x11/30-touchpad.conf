# Touchpad configuration for libinput (X11)
# Install: sudo cp x11/30-touchpad.conf /etc/X11/xorg.conf.d/30-touchpad.conf
# Applies to any touchpad via MatchIsTouchpad, so it survives hardware changes.

Section "InputClass"
    Identifier "libinput touchpad"
    MatchIsTouchpad "on"
    Driver "libinput"

    # Tap-to-click: 1-finger tap = left, 2 = right, 3 = middle
    Option "Tapping" "on"
    Option "TappingButtonMap" "lrm"

    # Tap-and-drag: tap then hold to drag; lock keeps drag active between taps
    Option "TappingDrag" "on"
    Option "TappingDragLock" "off"

    # Physical click: 1 finger = left, 2 = right, 3 = middle (no corner zones)
    Option "ClickMethod" "clickfinger"

    # Two-finger scroll, natural (content follows fingers)
    Option "ScrollMethod" "twofinger"
    Option "NaturalScrolling" "true"

    # Palm rejection: libinput palm detection is automatic; this ignores the
    # pad while typing, which handles the accidental-brush case.
    Option "DisableWhileTyping" "on"
EndSection
