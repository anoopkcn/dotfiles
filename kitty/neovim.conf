# Neovim — palette ported from nvim/init.lua custom highlights
# Based on Neovim's default 'vim' colorscheme with a pastel adaptation

foreground            #e0e2e9
background            #1d1f27

selection_foreground  #1d1f27
selection_background  #b1dafb

cursor                #b1dafb
cursor_text_color     #1d1f27

url_color             #a6f5f6

# Borders
active_border_color   #b1dafb
inactive_border_color #505257
bell_border_color     #f7e19e

# macOS titlebar — blend with terminal background
macos_titlebar_color  background

# Tab bar
active_tab_foreground   #b1dafb
active_tab_background   #505257
active_tab_font_style   bold
inactive_tab_foreground #b2b5b9
inactive_tab_background #292b33
inactive_tab_font_style normal
tab_bar_background      #1d1f27

# Normal
color0 #1d1f27
color1 #f5c3bb
color2 #c1f4c4
color3 #f7e19e
color4 #b1dafb
color5 #b26cc7
color6 #a6f5f6
color7 #e0e2e9

# Bright
color8  #505257
color9  #f5c3bb
color10 #c1f4c4
color11 #f7e19e
color12 #b1dafb
color13 #b26cc7
color14 #a6f5f6
