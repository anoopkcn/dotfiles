font_size 12.0
disable_ligatures always

# Sharper light-on-dark text. kitty does grayscale AA only (no subpixel), and on
# Linux the contrast term defaults to 0 (macOS uses 30), which makes light text on
# a dark bg render thin/soft. Bumping contrast thickens+sharpens it. gamma 1.0 is
# the Linux default (barely affects light-on-dark). Tune the 2nd number to taste.
text_composition_strategy 1.0 30
# font_family      family='Berkeley Mono' postscript_name=BerkeleyMono-Regular
# bold_font        auto
# italic_font      family='Berkeley Mono' postscript_name=BerkeleyMono-Regular
# bold_italic_font auto

font_family      family="Berkeley Mono Variable"
bold_font        auto
italic_font      auto
bold_italic_font auto
