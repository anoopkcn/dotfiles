# slate — kitty theme matching nvim/colors/slate.lua
# Lifted cool-slate background, soft off-white text, desaturated pastel accents.
# The 16 ANSI colors mirror slate.lua's vim.g.terminal_color_* so kitty and
# Neovim's :terminal render identically.

foreground            #e0e2ea
background            #232732

# Selection — the editor's blue-tinted Visual; keeps each cell's own fg colour
selection_foreground  none
selection_background  #303a54

# Cursor — bright block (fg colour) with dark text under it, like slate's Cursor
cursor                #e0e2ea
cursor_text_color     #232732

url_color             #88a0c8

# Borders
active_border_color   #88a0c8
inactive_border_color #32384a
bell_border_color     #ecbe70

# macOS titlebar — blend with terminal background
macos_titlebar_color  background

# Tab bar — mirrors slate's TabLine / TabLineSel / TabLineFill
active_tab_foreground   #f0f1f6
active_tab_background   #303a54
active_tab_font_style   bold
inactive_tab_foreground #828c9e
inactive_tab_background #2a2f3d
inactive_tab_font_style normal
tab_bar_background      #232732

# Normal (color0-7)
color0 #32384a
color1 #f7768e
color2 #a0ddac
color3 #ecbe70
color4 #88a0c8
color5 #c099ff
color6 #a0def3
color7 #e0e2ea

# Bright (color8-15)
color8  #828c9e
color9  #f7768e
color10 #8cc570
color11 #ecbe70
color12 #88a0c8
color13 #db9fd6
color14 #a0def3
color15 #ffffff
