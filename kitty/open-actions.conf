# Open file:// hyperlinks with a numeric line-number fragment (ripgrep with
# --hyperlink-format=kitty, etc.) in neovim, in a new tab in the current kitty.
# Without this rule, kitty falls through to macOS `open`, which sends code
# files to TextEdit.
protocol file
fragment_matches [0-9]+
action launch --type=tab --cwd=current /opt/homebrew/bin/nvim +${FRAGMENT} ${FILE_PATH}
