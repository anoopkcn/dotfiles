# HiDPI / Wayland toolkit hints (loaded by the systemd user session).
# Makes Qt, Firefox and Java apps use the Wayland backend so they scale
# crisply under sway's fractional scaling instead of blurry XWayland upscaling.
MOZ_ENABLE_WAYLAND=1
QT_QPA_PLATFORM=wayland;xcb
QT_WAYLAND_DISABLE_WINDOWDECORATION=1
_JAVA_AWT_WM_NONREPARENTING=1
