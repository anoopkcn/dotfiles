# Wayland toolkit hints (loaded by the systemd user session).
# Makes Qt, Firefox and Java apps use the Wayland backend so they render
# natively under sway instead of going through blurry XWayland. The output
# runs at native scale 1.0 (see sway/config), so this is about backend choice,
# not fractional scaling.
# NOTE: QT_QPA_PLATFORM=wayland needs qt5-wayland/qt6-wayland installed; without
# them Qt silently falls back to xcb (XWayland). None are installed yet — add
# them if you install a real Qt app.
MOZ_ENABLE_WAYLAND=1
QT_QPA_PLATFORM=wayland;xcb
QT_WAYLAND_DISABLE_WINDOWDECORATION=1
_JAVA_AWT_WM_NONREPARENTING=1

# Cursor theme/size — keeps the pointer uniform across native Wayland and
# XWayland apps at native scale 1.0 (matches gsettings cursor-theme = Adwaita).
XCURSOR_THEME=Adwaita
XCURSOR_SIZE=24

# Force software cursors. The Intel i915 hardware-cursor plane leaves trailing
# "ghost" pointers as the mouse moves on this Raptor Lake panel; rendering the
# cursor in software fixes it. wlroots reads this at backend init, so it only
# takes effect after a fresh sway session (re-login), not a config reload.
WLR_NO_HARDWARE_CURSORS=1
